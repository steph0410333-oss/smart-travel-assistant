services:
  - type: web
    name: smart-travel-assistant
    runtime: python
    plan: free
    region: singapore
    buildCommand: pip install -r requirements.txt && python -m unittest discover -v
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: GEMINI_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_API_KEY
        sync: false
